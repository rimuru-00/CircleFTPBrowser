name: Build APK

# Triggers: every push to main, AND a manual "Run workflow" button
# in the GitHub Actions tab (useful if you want to rebuild without pushing)
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1 — Check out the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2 — Java 17 is required by Android Gradle Plugin 8.x
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3 — The repo doesn't include gradle-wrapper.jar (it's a binary).
      #     We use the system Gradle on the runner to generate it so
      #     ./gradlew works correctly in the next step.
      - name: Generate Gradle wrapper JAR
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      # 4 — Android SDK is pre-installed on ubuntu-latest.
      #     Write its path into local.properties so Gradle can find it.
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # 5 — Make the wrapper script executable (GitHub strips execute bits)
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 6 — Build the debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 7 — Upload the APK so you can download it from the Actions tab
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CircleFTPBrowser-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          # Keep the artifact for 30 days
          retention-days: 30
          
