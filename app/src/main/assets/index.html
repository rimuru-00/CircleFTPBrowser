/* ─── Reset & tokens ─────────────────────────────────────────────────────── */
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}
:root {
    --bg:        #07070e;
    --surface:   #0c0d1a;
    --surface2:  #131428;
    --border:    #1c1e38;
    --accent:    #8b5cf6;
    --accent-dk: #6d28d9;
    --accent-lt: #a78bfa;
    --folder:    #f59e0b;
    --video:     #38bdf8;
    --watched:   #34d399;
    --progress:  #fb923c;
    --text:      #d4d4ec;
    --dim:       #52538a;
    --radius:    12px;
}
html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', 'Nunito', 'Poppins', -apple-system,
                 BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; }

/* ─── Header ─────────────────────────────────────────────────────────────── */
#header {
    flex-shrink: 0;
    height: 58px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 20px rgba(139,92,246,.08);
    display: flex;
    align-items: center;
    padding: 0 8px 0 4px;
    gap: 4px;
    z-index: 20;
}
.hdr-icon-btn {
    width: 44px; height: 44px;
    border: none; background: none;
    color: var(--text);
    font-size: 24px; line-height: 1;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s ease;
}
.hdr-icon-btn:active { background: var(--surface2); }
#hdrTitle {
    flex: 1;
    font-size: 17px; font-weight: 600;
    letter-spacing: -0.01em;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.hdr-badge {
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent-dk), var(--accent));
    color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 4px 9px; border-radius: 12px;
    box-shadow: 0 2px 8px rgba(139,92,246,.4);
}

/* ─── Search ─────────────────────────────────────────────────────────────── */
#searchWrap {
    flex: 1;
    display: none;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 0 10px 0 12px;
    height: 38px;
    gap: 8px;
    transform-origin: right center;
}
#searchWrap.active {
    display: flex;
    animation: searchSpring 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
/* hide native webkit/android clear button */
#searchInput::-webkit-search-cancel-button,
#searchInput::-webkit-input-placeholder { }
#searchInput {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text);
    font-size: 15px; font-family: inherit;
    caret-color: var(--accent);
    -webkit-user-select: text;
    user-select: text;
}
#searchInput::placeholder { color: var(--dim); }
#searchClear {
    background: none; border: none;
    color: var(--dim); font-size: 14px;
    cursor: pointer; padding: 2px 4px;
    border-radius: 50%;
    display: none;
    transition: color 0.15s;
}
#searchClear.visible { display: flex; align-items: center; justify-content: center; }
#searchClear:active  { color: var(--text); }
#searchClose {
    display: none;
    width: 36px; height: 36px;
    border: none; background: none;
    color: var(--dim); font-size: 20px;
    cursor: pointer; flex-shrink: 0;
    border-radius: 50%;
    align-items: center; justify-content: center;
    transition: color 0.15s ease;
}
#searchClose.visible { display: flex; }
#searchClose:active { color: var(--text); }

/* ─── Breadcrumb ─────────────────────────────────────────────────────────── */
#bread {
    display: none;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    height: 34px;
    align-items: center;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    white-space: nowrap;
}
#bread::-webkit-scrollbar { display: none; }
.crumb {
    font-size: 12px; font-weight: 500; color: var(--dim);
    padding: 4px 5px; border-radius: 4px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.crumb:not(.crumb-current):active { background: var(--surface2); }
.crumb-current { color: var(--accent-lt); cursor: default; }
.crumb-sep { font-size: 11px; color: var(--border); flex-shrink: 0; }

/* ─── Action bar ─────────────────────────────────────────────────────────── */
#actionBar {
    display: none;
    flex-direction: column;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 12px 10px;
    gap: 10px;
}
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-text {
    flex-shrink: 0;
    font-size: 11.5px; font-weight: 500; color: var(--dim); white-space: nowrap;
}
.progress-track {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--border); overflow: hidden;
}
.progress-fill {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-dk), var(--watched));
    transition: width .3s cubic-bezier(0.4, 0, 0.2, 1);
}
.action-btn-row { display: flex; gap: 8px; align-items: center; }
.ab-btn {
    flex: 1; height: 40px;
    border: none; border-radius: 10px;
    font-size: 13px; font-weight: 600; font-family: inherit;
    cursor: pointer;
    display: inline-flex; align-items: center;
    justify-content: center; gap: 6px;
    transition: opacity .15s ease, transform .1s ease;
}
.ab-btn:active { opacity: 0.78; transform: scale(0.97); }
.ab-fill {
    background: linear-gradient(135deg, var(--accent-dk), var(--accent));
    color: #fff;
    box-shadow: 0 3px 12px rgba(139,92,246,.35);
}
.ab-outline {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
}
.ab-icon {
    flex: 0 0 40px; width: 40px; height: 40px;
    background: var(--surface2);
    color: var(--dim); border: 1px solid var(--border);
    border-radius: 10px; font-size: 17px;
    transition: color .15s, border-color .15s, opacity .15s, transform .1s;
}
.ab-icon.active {
    color: var(--accent-lt);
    border-color: var(--accent);
}

/* ─── Scroll content ─────────────────────────────────────────────────────── */
#contentWrapper {
    flex: 1;
    display: flex;
    overflow: hidden;
}
#content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}
#content::-webkit-scrollbar { width: 2px; }
#content::-webkit-scrollbar-thumb { background: var(--border); }

/* ─── Alpha scroll bar ───────────────────────────────────────────────────── */
#alphaBar {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 22px;
    overflow-y: auto;
    padding: 6px 0;
    gap: 1px;
    scrollbar-width: none;
    flex-shrink: 0;
    background: linear-gradient(180deg, rgba(139,92,246,.04) 0%, transparent 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
}
#alphaBar.alpha-visible {
    opacity: 1;
    pointer-events: auto;
}
#alphaBar::-webkit-scrollbar { display: none; }
.alpha-btn {
    width: 18px; height: 18px;
    font-size: 10px; font-weight: 700; line-height: 1;
    color: var(--accent-lt);
    background: none; border: none;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; flex-shrink: 0;
    transition: background 0.1s, color 0.1s;
    font-family: inherit;
}
.alpha-btn:active { background: var(--accent); color: #fff; }

/* ─── Root count badge ───────────────────────────────────────────────────── */
.root-count {
    font-size: 11px; font-weight: 700;
    color: var(--accent-lt);
    background: rgba(139,92,246,.15);
    border: 1px solid rgba(139,92,246,.2);
    padding: 3px 8px; border-radius: 10px;
    white-space: nowrap; flex-shrink: 0;
    min-width: 20px; text-align: center;
    transition: opacity 0.3s;
}

/* ─── Root cards ─────────────────────────────────────────────────────────── */
.root-list { padding: 18px 14px; display: flex; flex-direction: column; gap: 12px; }
.continue-card {
    position: relative;
    display: flex; align-items: center; gap: 14px;
    padding: 15px 44px 15px 14px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px; cursor: pointer;
    box-shadow: 0 0 18px rgba(139,92,246,.12);
    animation: fadeUp 0.28s cubic-bezier(0.4,0,0.2,1) both;
}
.continue-card:active { background: var(--surface2); }
.continue-icon {
    width: 46px; height: 46px; border-radius: 12px;
    background: linear-gradient(135deg, rgba(109,40,217,.3), rgba(139,92,246,.2));
    color: var(--accent-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
}
.continue-info { flex: 1; min-width: 0; }
.continue-label {
    font-size: 10px; font-weight: 700; letter-spacing: .8px;
    color: var(--accent-lt); text-transform: uppercase; margin-bottom: 2px;
}
.continue-title {
    font-size: 14.5px; font-weight: 600;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.continue-path {
    font-size: 11px; color: var(--dim); margin-top: 2px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.continue-dismiss {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: none; color: var(--dim);
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.continue-dismiss:active { background: var(--surface2); }
.root-card {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; cursor: pointer;
    transition: border-color .2s;
    animation: fadeUp 0.32s cubic-bezier(0.4,0,0.2,1) both;
}
.root-card:active { background: var(--surface2); border-color: var(--accent); }
.root-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, rgba(109,40,217,.25), rgba(139,92,246,.15));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
}
.root-info { flex: 1; min-width: 0; }
.root-name { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.root-desc { font-size: 11.5px; color: var(--dim); margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ─── File / folder list ─────────────────────────────────────────────────── */
.fitem {
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px; height: 66px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .12s ease;
    animation: slideInX 0.2s ease both;
}
.fitem:active { background: var(--surface2); }

/* Expanded name state */
.fitem.ex {
    height: auto;
    min-height: 66px;
    align-items: flex-start;
    padding-top: 13px;
    padding-bottom: 13px;
}
.fitem.ex .finfo { padding-top: 1px; }
.fitem.ex .fname {
    white-space: normal !important;
    overflow: visible !important;
    word-break: break-word;
    cursor: text;
}

.ficon {
    width: 44px; height: 44px; border-radius: var(--radius);

}
.fi-dir      { background: rgba(245,158,11,.12); color: var(--folder); }

.fi-watched  { background: rgba( 52,211,153,.15); color: var(--watched);}

.finfo { flex: 1; min-width: 0; }
.fname {
    font-size: 14px; font-weight: 500;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    cursor: pointer; /* signals it's tappable to expand */
}
.fmeta { font-size: 11.5px; color: var(--dim); margin-top: 3px; }
.watched-tag  { color: var(--watched); }
.progress-tag { color: var(--progress); }
.farrow       { font-size: 18px; color: var(--border); flex-shrink: 0; }
.farrow-play  { color: var(--video); font-size: 14px; }
.expand-btn {
    background: none; border: none;
    color: var(--dim); font-size: 13px;
    padding: 8px 2px 8px 6px;
    cursor: pointer; flex-shrink: 0;
    line-height: 1; border-radius: 4px;
    transition: color 0.15s;
}
.expand-btn:active { color: var(--text); background: var(--surface2); }
.fitem.ex .expand-btn { color: var(--accent-lt); }
.match        { color: var(--accent-lt); font-weight: 700; }

/* ─── States ─────────────────────────────────────────────────────────────── */
.state-center {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 260px; gap: 14px;
    color: var(--dim); font-size: 14px;
    text-align: center; padding: 24px;
}
.spinner {
    width: 38px; height: 38px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .75s linear infinite, popIn 0.3s ease both;
}
@keyframes spin { to { transform: rotate(360deg); } }
.retry-btn {
    margin-top: 8px; padding: 9px 22px;
    border: 1px solid var(--border); border-radius: 10px;
    background: none; color: var(--text);

/* ─── Tab bar ─────────────────────────────────────────────────────────────── */
#tabBar {
    flex-shrink: 0;
    height: 56px;
    background: rgba(12,13,26,.92);
    backdrop-filter: blur(20px);

}

.tab-btn:active { transform: scale(0.87); }

/* ─── History View ───────────────────────────────────────────────────────── */
#historyView {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;

}
#historyView::-webkit-scrollbar { width: 2px; }
#historyView::-webkit-scrollbar-thumb { background: var(--border); }
.hist-section-title {
    font-size: 11px; font-weight: 700;

}

/* ─── Keyframes ──────────────────────────────────────────────────────────── */
@keyframes fadeUp    { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes slideInX  { from { opacity:0; transform:translateX(-14px); } to { opacity:1; transform:none; } }
@keyframes popIn     { from { opacity:0; transform:scale(0.6); } to { opacity:1; transform:none; } }
@keyframes searchSpring { from { opacity:0; transform:scaleX(0.8) scaleY(0.85); } to { opacity:1; transform:none; } }
@keyframes cFade     { from { opacity:0; } to { opacity:1; } }

/* ─── Animation helpers ──────────────────────────────────────────────────── */
#content.c-anim      { animation: cFade 0.22s ease both; }
#historyView.h-anim  { animation: cFade 0.22s ease both; }

/* ─── Accessibility ──────────────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
    }
    .spinner { animation: spin .75s linear infinite; }
}

<script>
"use strict";

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CONFIG = {
    roots: [
        {
            name : "Anime Series 1",
            icon : "🎌",
            url  : "http://ftp15.circleftp.net/FILE/English%20%26%20Foreign%20Anime%20Series/",
            desc : "ftp15.circleftp.net"
        },
        {
            name : "Anime Series 2",
            icon : "🎌",
            url  : "http://ftp17.circleftp.net/FILE/English%20%26%20Foreign%20Anime%20Series/",
            desc : "ftp17.circleftp.net"
        }
    ],
    videoExts: ['.mkv','.mp4','.avi','.m4v','.webm','.ts',
                '.flv','.wmv','.m2ts','.mov','.rmvb']
};

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
const STORAGE_KEYS = {
    WATCHED:      'cftp_watched_v1',
    LAST_FOLDER:  'cftp_lastFolder_v1',
    LAST_PLAYLIST:'cftp_lastPlaylist_v1',
    HISTORY:      'cftp_history_v1'
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const state = {
    stack        : [],
    items        : [],
    searchQuery  : '',
    searchActive : false,
    activeTab    : 'browse',
    expandAll    : false,
    expandedItems: new Set(),
    watched      : loadWatchedMap()
};

// ── WATCH TRACKING ────────────────────────────────────────────────────────────
function loadWatchedMap() {
    try { const r = localStorage.getItem(STORAGE_KEYS.WATCHED); return r ? JSON.parse(r) : {}; }
    catch (_) { return {}; }
}
function persistWatchedMap() {
    try { localStorage.setItem(STORAGE_KEYS.WATCHED, JSON.stringify(state.watched)); }
    catch (_) {}
}
function watchRecord(url) {
    const rec = state.watched[url];
    if (!rec) return null;
    if (typeof rec === 'object') return rec;
    return { completed: true, percent: 100, updatedAt: rec };
}
function markWatched(url) {
    const existing = (typeof state.watched[url] === 'object') ? state.watched[url] : {};
    state.watched[url] = Object.assign({}, existing, { completed: true, percent: 100, updatedAt: Date.now() });
    persistWatchedMap();
}
function recordPlaybackProgress(url, position, duration) {
    if (!url) return;
    const hasNums = typeof position === 'number' && position >= 0 &&
                    typeof duration === 'number' && duration > 0;
    const percent = hasNums ? Math.max(0, Math.min(100, Math.round((position / duration) * 100))) : 100;
    state.watched[url] = {
        completed: !hasNums || percent >= 95,
        percent, position: hasNums ? position : undefined,
        duration: hasNums ? duration : undefined,
        updatedAt: Date.now()
    };
    persistWatchedMap();
}
function markUrlsCompleted(urls) {
    let changed = false;
    urls.forEach(u => {
        const rec = watchRecord(u);
        if (!rec || !rec.completed) changed = true;
        state.watched[u] = { completed: true, percent: 100, updatedAt: Date.now() };
    });
    if (changed) persistWatchedMap();
}

// ── PLAYLIST ──────────────────────────────────────────────────────────────────
function saveLastPlaylist(urls) {
    try { localStorage.setItem(STORAGE_KEYS.LAST_PLAYLIST, JSON.stringify({ urls, startedAt: Date.now() })); }
    catch (_) {}
}
function loadLastPlaylist() {
    try { const r = localStorage.getItem(STORAGE_KEYS.LAST_PLAYLIST); return r ? JSON.parse(r) : null; }
    catch (_) { return null; }
}
function clearLastPlaylist() {
    try { localStorage.removeItem(STORAGE_KEYS.LAST_PLAYLIST); } catch (_) {}
}

// ── MX PLAYER RESULT ─────────────────────────────────────────────────────────
window.onPlaybackResult = function (result) {
    try {
        if (!result) return;
        const playlist = loadLastPlaylist();
        clearLastPlaylist();
        if (!playlist || !playlist.urls || !playlist.urls.length) return;
        if (result.end_by === 'playback_completion') {
            markUrlsCompleted(playlist.urls);
        } else if (result.uri) {
            const idx = playlist.urls.indexOf(result.uri);
            if (idx > 0) markUrlsCompleted(playlist.urls.slice(0, idx));
            if (idx !== -1) recordPlaybackProgress(result.uri, result.position, result.duration);
        }
        renderCurrentItems();
    } catch (_) {}
};

// ── FOLDER PERSISTENCE ────────────────────────────────────────────────────────
function loadLastFolder() {
    try { const r = localStorage.getItem(STORAGE_KEYS.LAST_FOLDER); return r ? JSON.parse(r) : null; }
    catch (_) { return null; }
}
function saveLastFolder(stack) {
    try { localStorage.setItem(STORAGE_KEYS.LAST_FOLDER, JSON.stringify(stack.map(s => ({ url:s.url, title:s.title })))); }
    catch (_) {}
}
function clearLastFolder() {
    try { localStorage.removeItem(STORAGE_KEYS.LAST_FOLDER); } catch (_) {}
}

// ── FOLDER CACHE ──────────────────────────────────────────────────────────────
// Avoids re-fetching folders the user already visited. Back navigation and
// breadcrumb jumps become instant. TTL = 5 min so stale content auto-expires.
const _folderCache = new Map(); // url → { items, ts }
const CACHE_TTL    = 5 * 60 * 1000;

// ── PARSING ───────────────────────────────────────────────────────────────────
function isVideoFile(name) {
    const lower = name.toLowerCase();
    return CONFIG.videoExts.some(ext => lower.endsWith(ext));
}
async function fetchDirectory(url) {
    const hit = _folderCache.get(url);
    if (hit && Date.now() - hit.ts < CACHE_TTL) return hit.items;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const items = parseH5aiHtml(await res.text(), url);
    _folderCache.set(url, { items, ts: Date.now() });
    return items;
}
function parseH5aiHtml(html, baseUrl) {
    const origin = new URL(baseUrl).origin;
    const doc    = new DOMParser().parseFromString(html, 'text/html');
    const items  = [];
    const seen   = new Set();
    const SKIP = new Set(['..','Parent Directory','Name','Last modified','Size',
                          'modern browsers','powered by h5ai','']);
    doc.querySelectorAll('a[href]').forEach(a => {
        const href    = (a.getAttribute('href') || '').trim();
        const rawName = a.textContent.trim();
        if (!href || !rawName || SKIP.has(rawName)) return;
        if (href === '..' || href === '../')  return;
        if (href.startsWith('?') || href.startsWith('#')) return;
        if (href.includes('larsjung.de') || href.includes('browsehappy')) return;
        if (href.startsWith('mailto:')) return;
        let fullUrl;
        if (href.startsWith('/')) fullUrl = origin + href;
        else if (href.startsWith('http://') || href.startsWith('https://')) {
            if (!href.startsWith(origin)) return;
            fullUrl = href;
        } else {
            try { fullUrl = new URL(href, baseUrl).href; } catch (_) { return; }
        }
        if (seen.has(fullUrl)) return;
        seen.add(fullUrl);
        let name = rawName;
        try { name = decodeURIComponent(rawName); } catch (_) {}
        const isDir   = fullUrl.endsWith('/');
        const isVideo = !isDir && isVideoFile(name);
        const size    = extractSize(a, isDir);
        items.push({ name, url: fullUrl, isDir, isVideo, size });
    });
    return items;
}
function extractSize(anchorEl, isDir) {
    if (isDir) return '';
    let el = anchorEl;
    for (let d = 0; d < 6; d++) {
        el = el.parentElement;
        if (!el) break;
        const sizeEl = el.querySelector('.size,[class*="size"]');
        if (sizeEl) { const t = sizeEl.textContent.trim(); if (/\d/.test(t) && t.length < 25) return formatSize(t); }
        if (el.tagName === 'TR') {
            const tds = el.querySelectorAll('td');
            if (tds.length >= 2) { const last = tds[tds.length-1].textContent.trim(); if (/\d+\s*[KMG]B/i.test(last)) return formatSize(last); }
        }
        if (el.hasAttribute('data-size')) { const v = el.getAttribute('data-size'); if (/\d/.test(v)) return formatSize(v); }
    }
    return '';
}
function formatSize(raw) {
    if (!raw) return '';
    const m = raw.trim().match(/^([\d,]+)\s*(KB|MB|GB|B)?$/i);
    if (!m) return raw.trim().slice(0,12);
    let bytes = parseInt(m[1].replace(/,/g,''), 10);
    const u = (m[2]||'B').toUpperCase();
    if (u==='KB') bytes *= 1024;
    else if (u==='MB') bytes *= 1048576;
    else if (u==='GB') bytes *= 1073741824;
    if (bytes >= 1073741824) return (bytes/1073741824).toFixed(2)+' GB';
    if (bytes >= 1048576)    return (bytes/1048576).toFixed(0)+' MB';
    if (bytes >= 1024)       return (bytes/1024).toFixed(0)+' KB';
    return bytes+' B';
}

// ── SEARCH ────────────────────────────────────────────────────────────────────

/**
 * Fuzzy word match using pre-normalized item fields (_lname, _lnorm).
 * `pairs` is [[word, wordNorm], ...] built once per render pass in renderItems.
 * "rezero" matches "Re Zero", "attackontitan" matches "Attack on Titan", etc.
 */
function matchesItem(item, pairs) {
    if (!pairs.length) return true;
    return pairs.every(([w, wNorm]) =>
        item._lname.includes(w) || item._lnorm.includes(wNorm)
    );
}
// Keep old name as thin wrapper for any callers that pass raw words
function matchesWords(name, words) {
    if (!words.length) return true;
    const lname = name.toLowerCase();
    const lnorm = lname.replace(/[\s\-_.]+/g, '');
    return words.every(w => lname.includes(w) || lnorm.includes(w.replace(/[\s\-_.]+/g, '')));
}

function buildHighlightRegex(query) {
    const words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    if (!words.length) return null;
    return new RegExp(
        '(' + words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|') + ')',
        'gi'
    );
}
function highlightName(name, regex) {
    if (!regex) return esc(name);
    return esc(name).replace(regex, '<span class="match">$1</span>');
}

function toggleSearch() {
    state.searchActive ? closeSearch() : openSearch();
}
function openSearch() {
    state.searchActive = true;
    state.searchQuery  = '';
    document.getElementById('hdrTitle').style.display   = 'none';
    document.getElementById('hdrBadge').style.display   = 'none';
    document.getElementById('searchBtn').style.display  = 'none';
    document.getElementById('searchWrap').classList.add('active');
    document.getElementById('searchClose').classList.add('visible');
    const inp = document.getElementById('searchInput');
    inp.value = '';
    // Defer focus so the open animation runs first, then keyboard appears
    requestAnimationFrame(() => inp.focus());
    // No re-render needed — items are already showing unfiltered
}
function closeSearch() {
    const hadQuery = !!state.searchQuery.trim();
    state.searchActive = false;
    state.searchQuery  = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchWrap').classList.remove('active');
    document.getElementById('searchClear').classList.remove('visible');
    document.getElementById('searchClose').classList.remove('visible');
    document.getElementById('hdrTitle').style.display   = '';
    document.getElementById('hdrBadge').style.display   = '';
    if (state.stack.length > 0)
        document.getElementById('searchBtn').style.display = '';
    // Only re-render if search was actually filtering — otherwise items
    // are already showing the full unfiltered list, no DOM work needed
    if (hadQuery) renderCurrentItems();
}
function clearSearch() {
    document.getElementById('searchInput').value = '';
    state.searchQuery = '';
    document.getElementById('searchClear').classList.remove('visible');
    renderCurrentItems(true);
    document.getElementById('searchInput').focus();
}

let searchDebounceTimer = null;
function onSearchInput(val) {
    state.searchQuery = val;
    const clearBtn = document.getElementById('searchClear');
    clearBtn.classList.toggle('visible', val.length > 0);
    clearTimeout(searchDebounceTimer);
    // 60ms feels instant; skip content animation during search (no reflow = no lag)
    searchDebounceTimer = setTimeout(() => renderCurrentItems(true), 60);
}

// ── NAME EXPAND / COLLAPSE ────────────────────────────────────────────────────
function toggleExpandAll() {
    state.expandAll = !state.expandAll;
    state.expandedItems.clear();
    document.querySelectorAll('.fitem').forEach(el =>
        el.classList.toggle('ex', state.expandAll)
    );
    document.getElementById('expandBtn').classList.toggle('active', state.expandAll);
}
function toggleItemExpand(event, idx) {
    event.stopPropagation();
    if (state.expandedItems.has(idx)) state.expandedItems.delete(idx);
    else state.expandedItems.add(idx);
    const expanded = state.expandedItems.has(idx) || state.expandAll;
    const el = document.querySelector(`.fitem[data-idx="${idx}"]`);
    if (!el) return;
    el.classList.toggle('ex', expanded);
    const btn = el.querySelector('.expand-btn');
    if (btn) btn.textContent = expanded ? '⌃' : '⌄';
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showRoot() {
    if (state.searchActive) closeSearch();
    state.stack = []; state.items = [];
    state.expandAll = false; state.expandedItems.clear();
    setHeader('Miru', false);
    setBreadcrumb([]);
    setActionBar([]);
    const cards = CONFIG.roots.map((r,i) => `
        <div class="root-card" style="animation-delay:${80+i*55}ms" onclick="browseRoot(${i})">
            <div class="root-icon">${r.icon}</div>
            <div class="root-info">
                <div class="root-name">${esc(r.name)}</div>
                <div class="root-desc">${esc(r.desc)}</div>
            </div>
            <div id="rootCount_${i}" class="root-count" style="opacity:0"></div>
            <div class="farrow">›</div>
        </div>`).join('');
    setContent(`<div class="root-list">${buildContinueCard()}${cards}</div>`);
    fetchRootCounts();
}
function buildContinueCard() {
    const last = loadLastFolder();
    if (!last || !last.length) return '';
    const deepest  = last[last.length - 1];
    const pathLabel = last.map(s => s.title).join(' › ');
    const safePath  = pathLabel.length > 60 ? '…' + pathLabel.slice(-58) : pathLabel;
    return `
    <div class="continue-card" onclick="continueBrowsing()">
        <div class="continue-icon">⏵</div>
        <div class="continue-info">
            <div class="continue-label">Continue Browsing</div>
            <div class="continue-title">${esc(deepest.title)}</div>
            <div class="continue-path">${esc(safePath)}</div>
        </div>
        <button class="continue-dismiss"
            onclick="event.stopPropagation();dismissContinue()">✕</button>
    </div>`;
}
function continueBrowsing() {
    const last = loadLastFolder();
    if (!last || !last.length) return;
    const deepest = last[last.length - 1];
    state.stack   = last.slice(0, -1);
    browse(deepest.url, deepest.title);
}
function dismissContinue() { clearLastFolder(); showRoot(); }
function browseRoot(idx)   { const r = CONFIG.roots[idx]; browse(r.url, r.name); }

async function browse(url, title) {
    if (state.searchActive) closeSearch();
    state.searchQuery = '';
    state.expandAll = false; state.expandedItems.clear();
    state.stack.push({ url, title });
    setHeader(title, true);
    setBreadcrumb(state.stack);
    setActionBar([]);
    setContent(`<div class="state-center"><div class="spinner"></div><span>Loading…</span></div>`);
    try {
        const items = await fetchDirectory(url);
        // Pre-compute lowercase + separator-stripped names once on load.
        // matchesWords reuses these instead of recomputing on every keystroke.
        items.forEach(item => {
            item._lname = item.name.toLowerCase();
            item._lnorm = item._lname.replace(/[\s\-_.]+/g, '');
        });
        state.items = items;
        renderCurrentItems();
        saveLastFolder(state.stack);
        saveToHistory(url, title, 'folder');
    } catch (err) {
        state.stack.pop();
        setBreadcrumb(state.stack);
        const safeUrl = escAttr(url), safeTitle = escAttr(title);
        setContent(`<div class="state-center">
            <div style="font-size:28px">⚠️</div>
            <span>Could not load folder</span>
            <span class="err-msg">${esc(err.message)}</span>
            <button class="retry-btn" onclick="browse('${safeUrl}','${safeTitle}')">Retry</button>
        </div>`);
    }
}

/** Re-render current folder items.
 *  @param {boolean} fromSearch - skip fade animation (prevents typing lag) */
function renderCurrentItems(fromSearch = false) {
    renderItems(state.items, state.searchQuery, fromSearch);
}

function renderItems(allItems, query, fromSearch = false) {
    // Build query pairs once: [[word, wordNormalized], ...]
    // reused across every item instead of recomputing per item
    const rawWords  = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    const pairs     = rawWords.map(w => [w, w.replace(/[\s\-_.]+/g, '')]);
    const hlRegex   = buildHighlightRegex(query);

    const filtered = allItems
        .map((item, idx) => ({ item, idx }))
        .filter(({ item }) => matchesItem(item, pairs));

    // Skip action bar update during search — it doesn't change while filtering
    if (!fromSearch) setActionBar(allItems);

    if (!filtered.length) {
        const msg = query.trim()
            ? `<div class="no-results">🔍</div><span>No results for "<b>${esc(query)}</b>"</span>`
            : '📂 This folder is empty';
        setContent(`<div class="state-center">${msg}</div>`, !fromSearch);
        return;
    }

    const rows = filtered.map(({ item, idx }, i) => {
        // No stagger during search or on large lists (300+ items computing
        // individual animation-delay styles blocks the render thread)
        const delay   = (!fromSearch && filtered.length <= 60) ? Math.min(i * 22, 220) : 0;
        const isEx    = (state.expandAll || state.expandedItems.has(idx)) ? ' ex' : '';
        const expBtn  = `<button class="expand-btn" onclick="event.stopPropagation();toggleItemExpand(event,${idx})" title="Expand name">${isEx ? '⌃' : '⌄'}</button>`;

        if (item.isDir) {
            return `<div class="fitem${isEx}" data-idx="${idx}" style="animation-delay:${delay}ms" onclick="clickItem(${idx})">
                <div class="ficon fi-dir">📁</div>
                <div class="finfo">
                    <div class="fname">${highlightName(item.name, hlRegex)}</div>
                    <div class="fmeta">Folder</div>
                </div>
                ${expBtn}
                <div class="farrow">›</div>
            </div>`;
        }
        if (item.isVideo) {
            const rec = watchRecord(item.url);
            const completed  = !!(rec && rec.completed);
            const percent    = rec ? (completed ? 100 : (rec.percent || 0)) : 0;
            const inProgress = !completed && percent > 0;
            let iconClass = 'fi-video', iconGlyph = '▶', tagHtml = '';
            if (completed)       { iconClass += ' fi-watched';  iconGlyph = '✓'; tagHtml = ' · <span class="watched-tag">Watched</span>'; }
            else if (inProgress) { iconClass += ' fi-progress'; tagHtml = ` · <span class="progress-tag">${percent}% watched</span>`; }
            const meta = item.size ? `Video · ${esc(item.size)}` : 'Video';
            return `<div class="fitem${isEx}" data-idx="${idx}" style="animation-delay:${delay}ms" onclick="clickItem(${idx})">
                <div class="ficon ${iconClass}">${iconGlyph}</div>
                <div class="finfo">
                    <div class="fname">${highlightName(item.name, hlRegex)}</div>
                    <div class="fmeta">${meta}${tagHtml}</div>
                </div>
                ${expBtn}
                <div class="farrow farrow-play">▶</div>
            </div>`;
        }
        return `<div class="fitem${isEx}" data-idx="${idx}" style="animation-delay:${delay}ms;opacity:.4;cursor:default">
            <div class="ficon" style="background:rgba(115,115,115,.08);color:var(--dim)">📄</div>
            <div class="finfo">
                <div class="fname">${esc(item.name)}</div>
                <div class="fmeta">${esc(item.size||'File')}</div>
            </div>
            ${expBtn}
        </div>`;
    }).join('');

    setContent(`<div>${rows}</div>`, !fromSearch);
    buildAlphaBar(allItems);
}

function clickItem(idx) {
    const item = state.items[idx];
    if (!item) return;
    if (item.isDir) { browse(item.url, item.name); return; }
    if (item.isVideo) {
        const allVideos = state.items.filter(i => i.isVideo);
        const startAt   = allVideos.findIndex(v => v.url === item.url);
        const playSeq   = allVideos.slice(Math.max(0, startAt));
        markWatched(item.url);
        saveToHistory(item.url, item.name);
        saveLastPlaylist(playSeq.map(v => v.url));
        // Lightweight UI update (no animation) — user is about to switch to MX Player
        renderCurrentItems(true);
        if (window.Android) {
            window.Android.openVideoWithPlaylist(
                JSON.stringify(allVideos.map(v => v.url)),
                JSON.stringify(allVideos.map(v => v.name)),
                Math.max(0, startAt)
            );
        } else {
            window.open(item.url, '_blank');
        }
    }
}

function goBack() {
    if (state.activeTab === 'history') { showTab('browse'); return; }
    if (state.searchActive) { closeSearch(); return; }
    if (state.stack.length === 0) { if (window.Android) window.Android.exitApp(); return; }
    if (state.stack.length === 1) { showRoot(); return; }
    state.stack.pop();
    const parent = state.stack.pop();
    browse(parent.url, parent.title);
}
function jumpToBreadcrumb(idx) {
    if (idx < 0) { showRoot(); return; }
    const target = state.stack[idx];
    state.stack  = state.stack.slice(0, idx);
    browse(target.url, target.title);
}

// ── PLAYBACK ──────────────────────────────────────────────────────────────────
function playAll() {
    const videos = state.items.filter(i => i.isVideo);
    if (!videos.length) return;
    markWatched(videos[0].url);
    saveToHistory(videos[0].url, videos[0].name);
    saveLastPlaylist(videos.map(v => v.url));
    renderCurrentItems(true);
    if (window.Android) {
        window.Android.openVideoWithPlaylist(
            JSON.stringify(videos.map(v => v.url)),
            JSON.stringify(videos.map(v => v.name)),
            0
        );
    }
}
function resumePlay() {
    const videos = state.items.filter(i => i.isVideo);
    if (!videos.length) return;
    let resumeIdx = videos.findIndex(v => { const r = watchRecord(v.url); return r && !r.completed && r.percent > 0; });
    if (resumeIdx === -1) resumeIdx = videos.findIndex(v => !watchRecord(v.url));
    if (resumeIdx === -1) resumeIdx = 0;
    markWatched(videos[resumeIdx].url);
    saveToHistory(videos[resumeIdx].url, videos[resumeIdx].name);
    saveLastPlaylist(videos.slice(resumeIdx).map(v => v.url));
    renderCurrentItems(true);
    if (window.Android) {
        window.Android.openVideoWithPlaylist(
            JSON.stringify(videos.map(v => v.url)),
            JSON.stringify(videos.map(v => v.name)),
            resumeIdx
        );
    }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────

/**
 * Replace content area.
 * @param {string}  html    - new innerHTML
 * @param {boolean} animate - replay fade animation; skip during search to avoid lag
 */
function setContent(html, animate = true) {
    const el = document.getElementById('content');
    el.classList.remove('c-anim');
    el.innerHTML = html;
    el.scrollTop = 0;
    document.getElementById('alphaBar').style.display = 'none';
    document.getElementById('alphaBar').classList.remove('alpha-visible');
    if (animate) requestAnimationFrame(() => el.classList.add('c-anim'));
}

// ── ALPHA SCROLL BAR ──────────────────────────────────────────────────────────
function buildAlphaBar(items) {
    const bar = document.getElementById('alphaBar');
    const folders = items.filter(i => i.isDir);

    if (!folders.length || state.stack.length === 0 || state.searchQuery.trim()) {
        bar.style.display = 'none';
        bar.classList.remove('alpha-visible');
        return;
    }

    const letterMap = new Map();
    folders.forEach(f => {
        const ch = f.name.trim()[0];
        if (!ch) return;
        const key = /[A-Za-z]/.test(ch) ? ch.toUpperCase() : '#';
        letterMap.set(key, (letterMap.get(key) || 0) + 1);
    });

    const letters = [];
    if ((letterMap.get('#') || 0) >= 2) letters.push('#');
    for (let c = 65; c <= 90; c++) {
        const ch = String.fromCharCode(c);
        if ((letterMap.get(ch) || 0) >= 2) letters.push(ch);
    }

    if (letters.length < 2) { bar.style.display = 'none'; bar.classList.remove('alpha-visible'); return; }

    bar.innerHTML = letters.map(l =>
        `<button class="alpha-btn" onclick="jumpToAlpha('${l}')">${l}</button>`
    ).join('');
    bar.style.display = 'flex';
}

function jumpToAlpha(letter) {
    const content = document.getElementById('content');
    const fitems  = content.querySelectorAll('.fitem');
    for (const el of fitems) {
        if (!el.querySelector('.fi-dir')) continue;
        const fname = el.querySelector('.fname');
        if (!fname) continue;
        const name = fname.textContent.trim();
        if (!name) continue;
        const firstCh = name[0];
        const isMatch = letter === '#'
            ? !/[A-Za-z]/.test(firstCh)
            : firstCh.toUpperCase() === letter;
        if (isMatch) {
            const containerTop = content.getBoundingClientRect().top;
            const elTop        = el.getBoundingClientRect().top;
            content.scrollTop += elTop - containerTop;
            break;
        }
    }
}

// ── ROOT COUNT ────────────────────────────────────────────────────────────────
const ROOT_COUNT_KEY = 'cftp_rootCount_v1';
const ROOT_COUNT_TTL = 30 * 60 * 1000;

async function fetchRootCounts() {
    try {
        const cached = localStorage.getItem(ROOT_COUNT_KEY);
        if (cached) {
            const { counts, ts } = JSON.parse(cached);
            if (Date.now() - ts < ROOT_COUNT_TTL) { updateRootCounts(counts); return; }
        }
    } catch (_) {}
    const counts = {};
    await Promise.all(CONFIG.roots.map(async (r) => {
        try {
            const items = await fetchDirectory(r.url);
            counts[r.url] = items.filter(i => i.isDir).length;
        } catch (_) { /* this source failed — leave its badge hidden, don't block others */ }
    }));
    if (Object.keys(counts).length) {
        try { localStorage.setItem(ROOT_COUNT_KEY, JSON.stringify({ counts, ts: Date.now() })); } catch (_) {}
        updateRootCounts(counts);
    }
}

function updateRootCounts(counts) {
    CONFIG.roots.forEach((r, i) => {
        const el = document.getElementById(`rootCount_${i}`);
        if (el && counts[r.url] !== undefined) {
            el.textContent = counts[r.url] + ' anime';
            el.style.opacity = '1';
        }
    });
}

function setHeader(title, showSearch) {
    document.getElementById('hdrTitle').textContent =
        title.length > 30 ? title.slice(0,28)+'…' : title;
    document.getElementById('backBtn').style.display   = state.stack.length > 0 ? 'flex' : 'none';
    document.getElementById('searchBtn').style.display = showSearch ? '' : 'none';
}

function setBreadcrumb(stack) {
    const el = document.getElementById('bread');
    if (!stack.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = 'flex';
    let html = `<span class="crumb" onclick="showRoot()">Home</span>`;
    stack.forEach((entry, i) => {
        const isLast = i === stack.length - 1;
        const label  = entry.title.length > 22 ? entry.title.slice(0,20)+'…' : entry.title;
        html += `<span class="crumb-sep">›</span>`;
        if (isLast) html += `<span class="crumb crumb-current">${esc(label)}</span>`;
        else        html += `<span class="crumb" onclick="jumpToBreadcrumb(${i})">${esc(label)}</span>`;
    });
    el.innerHTML  = html;
    requestAnimationFrame(() => { el.scrollLeft = el.scrollWidth; });
}

function setActionBar(items) {
    const el     = document.getElementById('actionBar');
    const videos = Array.isArray(items) ? items.filter(i => i.isVideo) : [];
    if (!videos.length) { el.style.display = 'none'; return; }

    let completedCount = 0, inProgressCount = 0;
    videos.forEach(v => {
        const rec = watchRecord(v.url);
        if (rec && rec.completed) completedCount++;
        else if (rec && rec.percent > 0) inProgressCount++;
    });
    const pct  = Math.round((completedCount / videos.length) * 100);
    let text   = `${completedCount} / ${videos.length} episode${videos.length === 1 ? '' : 's'} watched`;
    if (inProgressCount > 0) text += ` · ${inProgressCount} in progress`;
    document.getElementById('progressText').textContent = text;
    document.getElementById('progressFill').style.width = pct + '%';

    // Resume label: use folder position (1-based) which is always correct.
    // Also try SxxExx pattern as a fallback display override (e.g. S04E07 → Ep 7).
    const resumeTarget =
        videos.find(v => { const r = watchRecord(v.url); return r && !r.completed && r.percent > 0; }) ||
        videos.find(v => !watchRecord(v.url)) ||
        videos[0];
    if (resumeTarget) {
        const folderPos = videos.findIndex(v => v.url === resumeTarget.url);
        const sxxMatch  = resumeTarget.name.match(/S\d+E(\d{1,4})/i);
        const epNum     = sxxMatch ? parseInt(sxxMatch[1], 10) : (folderPos + 1);
        document.getElementById('resumeBtn').textContent =
            '\u23E9\u00A0 Resume Ep ' + epNum;
    }

    // Sync expand button state
    const expandBtn = document.getElementById('expandBtn');
    if (expandBtn) expandBtn.classList.toggle('active', state.expandAll);

    el.style.display = 'flex';
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function loadHistory() {
    try { const r = localStorage.getItem(STORAGE_KEYS.HISTORY); return r ? JSON.parse(r) : []; }
    catch (_) { return []; }
}
function saveToHistory(url, name, type = 'video') {
    try {
        let h = loadHistory().filter(e => e.url !== url);
        h.unshift({ url, name, type, at: Date.now() });
        if (h.length > 100) h.length = 100;
        localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(h));
    } catch (_) {}
}
function clearHistory() {
    try { localStorage.removeItem(STORAGE_KEYS.HISTORY); } catch (_) {}
    renderHistory();
}
function timeAgo(ts) {
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'Just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    return d < 7 ? d + 'd ago' : new Date(ts).toLocaleDateString();
}
function renderHistory() {
    const el      = document.getElementById('historyView');
    const history = loadHistory();
    if (!history.length) {
        el.innerHTML = `<div class="state-center">
            <div style="font-size:38px">🕒</div>
            <span style="font-weight:600">No history yet</span>
            <span style="font-size:12px;color:var(--dim)">Episodes and folders you visit will appear here</span>
        </div>`;
        return;
    }
    const rows = history.map((entry, i) => {
        const delay    = Math.min(i * 22, 220);
        const isFolder = (entry.type || 'video') === 'folder';
        if (isFolder) {
            return `<div class="fitem" style="animation-delay:${delay}ms" onclick="browseHistoryItem('${escAttr(entry.url)}','${escAttr(entry.name)}')">
                <div class="ficon fi-dir">📁</div>
                <div class="finfo">
                    <div class="fname">${esc(entry.name)}</div>
                    <div class="fmeta">${timeAgo(entry.at)} · Folder</div>
                </div>
                <div class="farrow">›</div>
            </div>`;
        }
        const rec = watchRecord(entry.url);
        const completed  = !!(rec && rec.completed);
        const percent    = rec ? (completed ? 100 : (rec.percent || 0)) : 0;
        const inProgress = !completed && percent > 0;
        let iconClass = 'fi-video', iconGlyph = '▶', tagHtml = '';
        if (completed)   { iconClass = 'fi-video fi-watched'; iconGlyph = '✓'; tagHtml = ' · <span class="watched-tag">Watched</span>'; }
        else if (inProgress) { iconClass = 'fi-video fi-progress'; tagHtml = ` · <span class="progress-tag">${percent}% watched</span>`; }
        return `<div class="fitem" style="animation-delay:${delay}ms" onclick="playHistoryItem('${escAttr(entry.url)}','${escAttr(entry.name)}')">
            <div class="ficon ${iconClass}">${iconGlyph}</div>
            <div class="finfo">
                <div class="fname">${esc(entry.name)}</div>
                <div class="fmeta">${timeAgo(entry.at)}${tagHtml}</div>
            </div>
            <div class="farrow farrow-play">▶</div>
        </div>`;
    }).join('');
    el.innerHTML = `
        <div style="display:flex;align-items:center;padding:14px 14px 6px;">
            <span class="hist-section-title">Recently Watched</span>
            <button onclick="clearHistory()" style="margin-left:auto;border:1px solid var(--border);
                background:none;color:var(--dim);font-size:11px;font-family:inherit;font-weight:500;
                cursor:pointer;padding:5px 12px;border-radius:8px;">Clear</button>
        </div>
        <div>${rows}</div>`;
}
function playHistoryItem(url, name) {
    saveLastPlaylist([url]);
    if (window.Android) {
        window.Android.openVideoWithPlaylist(JSON.stringify([url]), JSON.stringify([name]), 0);
    } else {
        window.open(url, '_blank');
    }
}
function browseHistoryItem(url, name) {
    showTab('browse');
    browse(url, name);
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────
function showTab(tab) {
    state.activeTab = tab;
    const isBrowse  = tab === 'browse';
    document.getElementById('contentWrapper').style.display = isBrowse ? '' : 'none';
    document.getElementById('historyView').style.display = isBrowse ? 'none' : 'block';
    document.getElementById('tabBrowse').classList.toggle('tab-active',  isBrowse);
    document.getElementById('tabHistory').classList.toggle('tab-active', !isBrowse);
    if (!isBrowse) {
        const hv = document.getElementById('historyView');
        hv.classList.remove('h-anim');
        requestAnimationFrame(() => requestAnimationFrame(() => hv.classList.add('h-anim')));
    }
    if (isBrowse) {
        document.getElementById('hdrBadge').style.display = '';
        const inFolder = state.stack.length > 0;
        setHeader(inFolder ? state.stack[state.stack.length-1].title : 'Miru', inFolder);
        setBreadcrumb(state.stack);
        setActionBar(state.items);
    } else {
        if (state.searchActive) {
            state.searchActive = false; state.searchQuery = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchWrap').classList.remove('active');
            document.getElementById('searchClear').classList.remove('visible');
            document.getElementById('searchClose').classList.remove('visible');
        }
        document.getElementById('hdrBadge').style.display   = 'none';
        document.getElementById('hdrTitle').textContent      = 'History';
        document.getElementById('backBtn').style.display     = 'none';
        document.getElementById('searchBtn').style.display   = 'none';
        document.getElementById('bread').style.display       = 'none';
        document.getElementById('actionBar').style.display   = 'none';
        renderHistory();
    }
}

// ── ESCAPING ──────────────────────────────────────────────────────────────────
function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s) {
    return String(s)
        .replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// ── ALPHA BAR SCROLL REVEAL ───────────────────────────────────────────────────
let _alphaHideTimer = null;
document.getElementById('content').addEventListener('scroll', function() {
    const bar = document.getElementById('alphaBar');
    if (bar.style.display !== 'flex') return;
    bar.classList.add('alpha-visible');
    clearTimeout(_alphaHideTimer);
    _alphaHideTimer = setTimeout(() => bar.classList.remove('alpha-visible'), 1500);
}, { passive: true });

// ── INIT ──────────────────────────────────────────────────────────────────────
// Block native long-press context menu (copy/cut/select) — feels like APK
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => {
    // Allow selection in the search input only
    if (e.target.id !== 'searchInput') e.preventDefault();
});
showRoot();
</script>
