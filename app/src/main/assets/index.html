<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,
      maximum-scale=1.0, user-scalable=no">
<title>CircleFTP</title>
<style>
/* ─── Reset & tokens ──────────────────────────────────────────────────── */
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
:root {
    /* Background layers */
    --bg:         #08080f;
    --surface:    #0f0f1c;
    --surface2:   #171729;
    --surface3:   #1f1f38;

    /* Borders */
    --border:     #242440;
    --border2:    #32325c;

    /* Accent – violet / purple gradient */
    --accent:     #8b5cf6;
    --accent-hi:  #c4b5fd;
    --accent-lo:  rgba(139,92,246,.13);
    --grad:       linear-gradient(135deg,#7c3aed,#a855f7);
    --grad-glow:  rgba(124,58,237,.28);

    /* Status colours */
    --folder:     #fbbf24;
    --folder-lo:  rgba(251,191,36,.10);
    --video:      #38bdf8;
    --video-lo:   rgba(56,189,248,.10);
    --watched:    #4ade80;
    --watched-lo: rgba(74,222,128,.10);
    --inprog:     #fb923c;
    --inprog-lo:  rgba(251,146,60,.10);

    /* Text */
    --text:  #e4e2f8;
    --text2: #9896c0;
    --dim:   #545478;

    /* Shape */
    --r:    12px;
    --rl:   16px;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
}
body { display: flex; flex-direction: column; }

/* ─── Header ──────────────────────────────────────────────────────────── */
#header {
    flex-shrink: 0;
    height: 58px;
    background: rgba(8,8,15,.90);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px 0 6px;
    gap: 4px;
    z-index: 20;
}
.hdr-icon-btn {
    width: 44px; height: 44px;
    border: none; background: none;
    color: var(--text2);
    font-size: 22px; line-height: 1;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.hdr-icon-btn:active { background: var(--surface2); color: var(--text); }

#hdrTitle {
    flex: 1;
    font-size: 17px; font-weight: 600; letter-spacing: -.3px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.hdr-badge {
    flex-shrink: 0;
    background: var(--grad); color: #fff;
    font-size: 9px; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 10px; border-radius: 20px;
}

/* ─── Search ──────────────────────────────────────────────────────────── */
#searchWrap {
    flex: 1;
    display: none;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 0 12px;
    height: 38px;
    gap: 8px;
}
#searchWrap.active { display: flex; }
#searchInput {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text);
    font-size: 15px;
    caret-color: var(--accent);
}
#searchInput::placeholder { color: var(--dim); }
#searchClear {
    background: none; border: none;
    color: var(--dim); font-size: 18px;
    cursor: pointer; padding: 0; display: none;
}
#searchClear.visible { display: block; }

/* ─── Breadcrumb ──────────────────────────────────────────────────────── */
#bread {
    display: none;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 14px;
    height: 32px;
    align-items: center;
    gap: 2px;
    overflow-x: auto;
    scrollbar-width: none;
    white-space: nowrap;
}
#bread::-webkit-scrollbar { display: none; }
.crumb {
    font-size: 11.5px; color: var(--dim);
    padding: 3px 6px; border-radius: 6px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.crumb:not(.crumb-current):active { background: var(--surface2); color: var(--text2); }
.crumb-current { color: var(--text2); cursor: default; font-weight: 500; }
.crumb-sep { font-size: 11px; color: var(--border2); flex-shrink: 0; padding: 0 2px; }

/* ─── Action bar ──────────────────────────────────────────────────────── */
#actionBar {
    display: none;
    flex-direction: column;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px 12px;
    gap: 10px;
}
.progress-row { display: flex; align-items: center; gap: 10px; }
.progress-text {
    flex-shrink: 0;
    font-size: 11px; color: var(--dim); white-space: nowrap; font-weight: 500;
}
.progress-track {
    flex: 1; height: 3px; border-radius: 2px;
    background: var(--border); overflow: hidden;
}
.progress-fill {
    height: 100%; width: 0%; border-radius: 2px;
    background: var(--grad);
    transition: width .3s ease;
}
.action-btn-row { display: flex; gap: 10px; }
.ab-btn {
    flex: 1; height: 42px;
    border: none; border-radius: var(--r);
    font-size: 13.5px; font-weight: 700;
    cursor: pointer;
    display: inline-flex; align-items: center;
    justify-content: center; gap: 7px;
    letter-spacing: .1px;
}
.ab-btn:active { opacity: .75; }
.ab-fill {
    background: var(--grad); color: #fff;
    box-shadow: 0 4px 18px var(--grad-glow);
}
.ab-outline {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border2);
}

/* ─── Content ─────────────────────────────────────────────────────────── */
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#content::-webkit-scrollbar { width: 2px; }
#content::-webkit-scrollbar-thumb { background: var(--border); }

/* ─── Root list ───────────────────────────────────────────────────────── */
.root-list { padding: 0 14px 24px; display: flex; flex-direction: column; gap: 12px; }

/* ─── Home hero ───────────────────────────────────────────────────────── */
.home-hero {
    text-align: center;
    padding: 28px 16px 16px;
}
.home-hero-icon {
    font-size: 52px; line-height: 1; margin-bottom: 12px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(139,92,246,.55));
}
.home-hero-title {
    font-size: 28px; font-weight: 800; letter-spacing: -.6px;
    background: var(--grad);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px; line-height: 1.1;
}
.home-hero-sub {
    font-size: 12px; color: var(--dim);
    letter-spacing: .6px; text-transform: uppercase; font-weight: 600;
}

/* ─── Continue card ───────────────────────────────────────────────────── */
.continue-card {
    position: relative;
    display: flex; align-items: center; gap: 14px;
    padding: 16px 44px 16px 16px;
    background: linear-gradient(135deg,
        rgba(124,58,237,.11) 0%,
        rgba(168,85,247,.05) 100%);
    border: 1px solid rgba(139,92,246,.30);
    border-radius: var(--rl); cursor: pointer;
}
.continue-card:active { background: rgba(139,92,246,.18); }
.continue-icon {
    width: 46px; height: 46px; border-radius: 14px;
    background: var(--grad); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 14px var(--grad-glow);
}
.continue-info { flex: 1; min-width: 0; }
.continue-label {
    font-size: 9.5px; font-weight: 800; letter-spacing: 1px;
    color: var(--accent-hi); text-transform: uppercase; margin-bottom: 3px;
}
.continue-title {
    font-size: 15px; font-weight: 700;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.continue-path {
    font-size: 11px; color: var(--dim); margin-top: 2px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.continue-dismiss {
    position: absolute; top: 10px; right: 10px;
    width: 26px; height: 26px; border-radius: 50%;
    border: none; background: rgba(255,255,255,.06); color: var(--dim);
    font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.continue-dismiss:active { background: var(--surface3); }

/* ─── Root card ───────────────────────────────────────────────────────── */
.root-card {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--rl); cursor: pointer;
}
.root-card:active { background: var(--surface2); border-color: var(--border2); }
.root-icon {
    width: 52px; height: 52px; border-radius: 14px;
    background: var(--accent-lo);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
}
.root-info { flex: 1; min-width: 0; }
.root-name { font-size: 15.5px; font-weight: 700; letter-spacing: -.2px; }
.root-desc { font-size: 11.5px; color: var(--dim); margin-top: 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.root-card .farrow { font-size: 20px; color: var(--dim); }

/* ─── File list ───────────────────────────────────────────────────────── */
.fitem {
    display: flex; align-items: center; gap: 14px;
    padding: 0 14px; min-height: 66px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
}
.fitem:active { background: var(--surface2); }
.fi-other { opacity: .35; pointer-events: none; }

.ficon {
    width: 44px; height: 44px; border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0; font-weight: 700;
}
.fi-dir      { background: var(--folder-lo); color: var(--folder); }
.fi-video    { background: var(--video-lo);  color: var(--video);  }
.fi-watched  { background: var(--watched-lo);color: var(--watched);}
.fi-progress { background: var(--inprog-lo); color: var(--inprog); }
.fi-file     { background: rgba(84,84,120,.10); color: var(--dim); }

.finfo { flex: 1; min-width: 0; }
.fname {
    font-size: 13.5px; font-weight: 500;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    line-height: 1.3;
}
.fmeta { font-size: 11px; color: var(--dim); margin-top: 3px; }
.watched-tag  { color: var(--watched); font-weight: 600; }
.progress-tag { color: var(--inprog);  font-weight: 600; }

.farrow      { font-size: 18px; color: var(--border2); flex-shrink: 0; }
.farrow-play { color: var(--accent-hi); font-size: 13px; opacity: .75; }

/* highlight matched search chars */
.match { color: var(--accent-hi); font-weight: 700; }

/* ─── States ──────────────────────────────────────────────────────────── */
.state-center {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 240px; gap: 12px;
    color: var(--dim); font-size: 14px;
    text-align: center; padding: 28px;
}
.spinner {
    width: 34px; height: 34px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.retry-btn {
    margin-top: 8px; padding: 9px 22px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface2); color: var(--text2);
    font-size: 13px; cursor: pointer; font-weight: 500;
}
.retry-btn:active { background: var(--surface3); }
.err-msg { font-size: 12px; color: var(--dim); word-break: break-word; max-width: 260px; }
.no-results { font-size: 32px; margin-bottom: 4px; }

/* ─── Tab bar ─────────────────────────────────────────────────────────── */
#tabBar {
    flex-shrink: 0;
    height: 60px;
    background: rgba(8,8,15,.92);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 6px 12px;
    gap: 6px;
    z-index: 20;
}
.tab-btn {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
    border: none; background: none;
    color: var(--dim);
    font-size: 22px; cursor: pointer;
    padding: 8px 0; border-radius: var(--r);
}
.tab-btn span {
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase;
}
.tab-btn:active { background: var(--surface2); }
.tab-active { color: var(--accent-hi) !important; background: var(--accent-lo) !important; }

/* ─── History ─────────────────────────────────────────────────────────── */
#historyView {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
}
#historyView::-webkit-scrollbar { width: 2px; }
#historyView::-webkit-scrollbar-thumb { background: var(--border); }

.hist-section-title {
    font-size: 11px; font-weight: 800;
    letter-spacing: .9px; color: var(--dim);
    text-transform: uppercase;
}
.hist-header {
    display: flex; align-items: center;
    padding: 16px 14px 8px;
}
.hist-clear-btn {
    margin-left: auto;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface2); color: var(--text2);
    font-size: 11px; font-weight: 600;
    cursor: pointer; padding: 5px 12px;
}
.hist-clear-btn:active { background: var(--surface3); }
</style>
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────────── -->
<div id="header">
    <button id="backBtn"   class="hdr-icon-btn" style="display:none" onclick="goBack()">‹</button>
    <div    id="hdrTitle">CircleFTP</div>
    <!-- search input — hidden until searchBtn tapped -->
    <div id="searchWrap">
        <span style="color:var(--dim);font-size:16px">⌕</span>
        <input id="searchInput" type="search" placeholder="Search…"
               autocomplete="off" autocorrect="off" spellcheck="false"
               oninput="onSearchInput(this.value)">
        <button id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <button id="searchBtn" class="hdr-icon-btn" style="display:none" onclick="toggleSearch()">⌕</button>
    <div    id="hdrBadge"  class="hdr-badge">FTP</div>
</div>

<!-- ── Breadcrumb ────────────────────────────────────────────────────── -->
<div id="bread"></div>

<!-- ── Action bar ────────────────────────────────────────────────────── -->
<div id="actionBar" style="display:none;">
    <div class="progress-row">
        <span id="progressText" class="progress-text"></span>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
    </div>
    <div class="action-btn-row">
        <button class="ab-btn ab-fill"    onclick="playAll()">▶&nbsp; Play All</button>
        <button class="ab-btn ab-outline" id="resumeBtn" onclick="resumePlay()">⏩&nbsp; Resume</button>
    </div>
</div>

<!-- ── Content ───────────────────────────────────────────────────────── -->
<div id="content"></div>

<!-- ── History view ──────────────────────────────────────────────────── -->
<div id="historyView"></div>

<!-- ── Tab bar ───────────────────────────────────────────────────────── -->
<div id="tabBar">
    <button id="tabBrowse"  class="tab-btn tab-active" onclick="showTab('browse')">📂<span>Browse</span></button>
    <button id="tabHistory" class="tab-btn"            onclick="showTab('history')">🕒<span>History</span></button>
</div>


<script>
"use strict";

// ── CONFIG ────────────────────────────────────────────────────────────────────
const CONFIG = {
    roots: [
        {
            name : "Anime Series",
            icon : "🎌",
            url  : "http://ftp15.circleftp.net/FILE/English%20%26%20Foreign%20Anime%20Series/",
            desc : "ftp15.circleftp.net"
        }
        // Add more roots here
    ],
    videoExts: ['.mkv','.mp4','.avi','.m4v','.webm','.ts',
                '.flv','.wmv','.m2ts','.mov','.rmvb']
};

// ── PERSISTENCE (localStorage) ────────────────────────────────────────────────
const STORAGE_KEYS = {
    WATCHED:      'cftp_watched_v1',
    LAST_FOLDER:  'cftp_lastFolder_v1',
    LAST_PLAYLIST:'cftp_lastPlaylist_v1',
    HISTORY:      'cftp_history_v1'
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const state = {
    stack       : [],   // navigation history: [{url, title}]
    items       : [],   // full unfiltered items in current folder
    searchQuery : '',   // current search string
    searchActive: false,
    activeTab   : 'browse',  // 'browse' | 'history'
    watched     : loadWatchedMap()   // { videoUrl: record } — see watchRecord() below
};

/**
 * Watched-episode tracking. Stored as { videoUrl: record } in localStorage so
 * checkmarks/progress survive app restarts.
 *
 * record is normally an object: { completed, percent, position, duration, updatedAt }.
 * Older builds stored a plain timestamp number instead — watchRecord() below
 * reads those transparently as completed:true so nobody's existing checkmarks
 * disappear on upgrade.
 *
 * "completed" is set two ways:
 *   1. Optimistically the moment an episode is tapped/started (markWatched) —
 *      the same simple behavior as before, just per-episode instead of
 *      blanket-applied to an entire Play All / Shuffle batch.
 *   2. Authoritatively from MX Player's actual playback result, if the
 *      installed build still returns one (see onPlaybackResult below) — this
 *      is what fills in real position/duration and corrects episodes that
 *      were never actually played.
 */
function loadWatchedMap() {
    try {
        const raw = localStorage.getItem(STORAGE_KEYS.WATCHED);
        return raw ? JSON.parse(raw) : {};
    } catch (_) { return {}; }
}

function persistWatchedMap() {
    try { localStorage.setItem(STORAGE_KEYS.WATCHED, JSON.stringify(state.watched)); }
    catch (_) { /* storage full/unavailable — fail silently, app still works */ }
}

/** Normalizes a stored entry (object OR legacy timestamp number) into a record shape. */
function watchRecord(url) {
    const rec = state.watched[url];
    if (!rec) return null;
    if (typeof rec === 'object') return rec;
    return { completed: true, percent: 100, updatedAt: rec }; // legacy format
}

/** Optimistic "tapped / started this" marker — may get refined later by a
 *  real position/duration from recordPlaybackProgress(). */
function markWatched(url) {
    const existing = (typeof state.watched[url] === 'object') ? state.watched[url] : {};
    state.watched[url] = Object.assign({}, existing, {
        completed: true,
        percent: 100,
        updatedAt: Date.now()
    });
    persistWatchedMap();
}

/** Records a real per-episode result reported back by MX Player. */
function recordPlaybackProgress(url, position, duration) {
    if (!url) return;
    const hasNums = typeof position === 'number' && position >= 0 &&
                    typeof duration === 'number' && duration > 0;
    const percent = hasNums ? Math.max(0, Math.min(100, Math.round((position / duration) * 100))) : 100;
    state.watched[url] = {
        completed: !hasNums || percent >= 95,   // missing position/duration = finished normally
        percent: percent,
        position: hasNums ? position : undefined,
        duration: hasNums ? duration : undefined,
        updatedAt: Date.now()
    };
    persistWatchedMap();
}

/** Marks every URL in the list as fully completed — used when MX Player
 *  reports the whole launched queue played through to its natural end. */
function markUrlsCompleted(urls) {
    let changed = false;
    urls.forEach(u => {
        const rec = watchRecord(u);
        if (!rec || !rec.completed) changed = true;
        state.watched[u] = { completed: true, percent: 100, updatedAt: Date.now() };
    });
    if (changed) persistWatchedMap();
}

/**
 * Remembers the exact sequence of URLs just handed to MX Player (in actual
 * playback order, starting from wherever playback begins) so that, if a
 * result comes back later, we know which episodes in THIS session preceded
 * whichever one was on screen when the user exited. Persisted (not just kept
 * in memory) because onActivityResult can in principle arrive after Android
 * has recreated the Activity — that reloads index.html and resets JS state,
 * but localStorage survives.
 */
function saveLastPlaylist(urls) {
    try {
        localStorage.setItem(STORAGE_KEYS.LAST_PLAYLIST, JSON.stringify({ urls, startedAt: Date.now() }));
    } catch (_) { /* ignore */ }
}

function loadLastPlaylist() {
    try {
        const raw = localStorage.getItem(STORAGE_KEYS.LAST_PLAYLIST);
        return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
}

function clearLastPlaylist() {
    try { localStorage.removeItem(STORAGE_KEYS.LAST_PLAYLIST); }
    catch (_) { /* ignore */ }
}

/**
 * Called from native code (MainActivity#onActivityResult) after the user
 * returns from MX Player — IF the installed build still honors
 * "return_result" the way stock MX Player does. On a heavily modified APK
 * this may simply never fire; everything still works without it, just
 * without the extra accuracy below.
 *
 * result: { ok, uri, position, duration, end_by }
 */
window.onPlaybackResult = function (result) {
    try {
        if (!result) return;
        const playlist = loadLastPlaylist();
        clearLastPlaylist();
        if (!playlist || !playlist.urls || !playlist.urls.length) return;

        if (result.end_by === 'playback_completion') {
            // Reached the natural end of everything we handed to MX Player.
            markUrlsCompleted(playlist.urls);
        } else if (result.uri) {
            const idx = playlist.urls.indexOf(result.uri);
            if (idx > 0) {
                // Everything earlier in THIS session's sequence played through
                // before the user reached/left the one MX Player reported.
                markUrlsCompleted(playlist.urls.slice(0, idx));
            }
            if (idx !== -1) {
                recordPlaybackProgress(result.uri, result.position, result.duration);
            }
        }
        renderCurrentItems();
    } catch (_) { /* never let a native callback break the UI */ }
};

/**
 * "Continue Browsing" — remembers the deepest folder the user navigated into,
 * as the full breadcrumb chain (so jumping back in restores proper breadcrumbs,
 * not just a flat URL). Updated every time browse() successfully loads a folder.
 */
function loadLastFolder() {
    try {
        const raw = localStorage.getItem(STORAGE_KEYS.LAST_FOLDER);
        return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
}

function saveLastFolder(stack) {
    try {
        const trimmed = stack.map(s => ({ url: s.url, title: s.title }));
        localStorage.setItem(STORAGE_KEYS.LAST_FOLDER, JSON.stringify(trimmed));
    } catch (_) { /* ignore */ }
}

function clearLastFolder() {
    try { localStorage.removeItem(STORAGE_KEYS.LAST_FOLDER); }
    catch (_) { /* ignore */ }
}

// ── PARSING ───────────────────────────────────────────────────────────────────

function isVideoFile(name) {
    const lower = name.toLowerCase();
    return CONFIG.videoExts.some(ext => lower.endsWith(ext));
}

async function fetchDirectory(url) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    return parseH5aiHtml(html, url);
}

function parseH5aiHtml(html, baseUrl) {
    const origin = new URL(baseUrl).origin;
    const doc    = new DOMParser().parseFromString(html, 'text/html');
    const items  = [];
    const seen   = new Set();

    const SKIP = new Set(['..','Parent Directory','Name','Last modified','Size',
                          'modern browsers','powered by h5ai','']);

    doc.querySelectorAll('a[href]').forEach(a => {
        const href    = (a.getAttribute('href') || '').trim();
        const rawName = a.textContent.trim();

        if (!href || !rawName)             return;
        if (SKIP.has(rawName))             return;
        if (href === '..' || href==='../')  return;
        if (href.startsWith('?'))           return;
        if (href.startsWith('#'))           return;
        if (href.includes('larsjung.de'))   return;
        if (href.includes('browsehappy'))   return;
        if (href.startsWith('mailto:'))     return;

        let fullUrl;
        if (href.startsWith('/')) {
            fullUrl = origin + href;
        } else if (href.startsWith('http://') || href.startsWith('https://')) {
            if (!href.startsWith(origin)) return;
            fullUrl = href;
        } else {
            try { fullUrl = new URL(href, baseUrl).href; }
            catch (_) { return; }
        }

        if (seen.has(fullUrl)) return;
        seen.add(fullUrl);

        let name = rawName;
        try { name = decodeURIComponent(rawName); } catch (_) {}

        const isDir   = fullUrl.endsWith('/');
        const isVideo = !isDir && isVideoFile(name);
        const size    = extractSize(a, isDir);

        items.push({ name, url: fullUrl, isDir, isVideo, size });
    });

    return items;
}

function extractSize(anchorEl, isDir) {
    if (isDir) return '';
    let el = anchorEl;
    for (let d = 0; d < 6; d++) {
        el = el.parentElement;
        if (!el) break;
        const sizeEl = el.querySelector('.size,[class*="size"]');
        if (sizeEl) {
            const t = sizeEl.textContent.trim();
            if (/\d/.test(t) && t.length < 25) return formatSize(t);
        }
        if (el.tagName === 'TR') {
            const tds = el.querySelectorAll('td');
            if (tds.length >= 2) {
                const last = tds[tds.length-1].textContent.trim();
                if (/\d+\s*KB/i.test(last)||/\d+\s*MB/i.test(last)) return formatSize(last);
            }
        }
        if (el.hasAttribute('data-size')) {
            const v = el.getAttribute('data-size');
            if (/\d/.test(v)) return formatSize(v);
        }
    }
    return '';
}

function formatSize(raw) {
    if (!raw) return '';
    const m = raw.trim().match(/^([\d,]+)\s*(KB|MB|GB|B)?$/i);
    if (!m) return raw.trim().slice(0,12);
    let bytes = parseInt(m[1].replace(/,/g,''), 10);
    const u = (m[2]||'B').toUpperCase();
    if (u==='KB') bytes *= 1024;
    else if (u==='MB') bytes *= 1048576;
    else if (u==='GB') bytes *= 1073741824;
    if (bytes >= 1073741824) return (bytes/1073741824).toFixed(2)+' GB';
    if (bytes >= 1048576)    return (bytes/1048576).toFixed(0)+' MB';
    if (bytes >= 1024)       return (bytes/1024).toFixed(0)+' KB';
    return bytes+' B';
}

// ── SEARCH ────────────────────────────────────────────────────────────────────

/**
 * Fuzzy word search: every word must appear somewhere in the name
 * (case-insensitive). Handles:
 *   "attack titan"  → Attack on Titan ✓
 *   "one piece"     → One Piece ✓
 *   "naruto shipp"  → Naruto Shippuden ✓
 *
 * Accepts a pre-split, lowercased `words` array (built once per render
 * pass by renderItems) instead of re-splitting the query string for
 * every single item being filtered.
 */
function matchesWords(name, words) {
    if (!words.length) return true;
    const lName = name.toLowerCase();
    return words.every(w => lName.includes(w));
}

/**
 * Build a single compiled regex for the current query, reused across all
 * items in a render pass instead of recompiling per item (that recompilation
 * on every keystroke across a large list was part of the search lag).
 */
function buildHighlightRegex(query) {
    const words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    if (!words.length) return null;
    return new RegExp(
        '(' + words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|') + ')',
        'gi'
    );
}

/**
 * Highlight matching words in a name string for display.
 * Returns safe HTML with <span class="match"> around matched segments.
 * `regex` should come from buildHighlightRegex(), built once per render pass.
 */
function highlightName(name, regex) {
    if (!regex) return esc(name);
    return esc(name).replace(regex, '<span class="match">$1</span>');
}

function toggleSearch() {
    if (state.searchActive) {
        closeSearch();
    } else {
        openSearch();
    }
}

function openSearch() {
    state.searchActive = true;
    state.searchQuery  = '';
    document.getElementById('hdrTitle').style.display    = 'none';
    document.getElementById('hdrBadge').style.display    = 'none';
    document.getElementById('searchBtn').style.display   = 'none';
    document.getElementById('searchWrap').classList.add('active');
    const inp = document.getElementById('searchInput');
    inp.value = '';
    inp.focus();
    renderCurrentItems();
}

function closeSearch() {
    state.searchActive = false;
    state.searchQuery  = '';
    document.getElementById('searchInput').value          = '';
    document.getElementById('searchWrap').classList.remove('active');
    document.getElementById('searchClear').classList.remove('visible');
    // Restore header elements
    document.getElementById('hdrTitle').style.display    = '';
    document.getElementById('hdrBadge').style.display    = '';
    if (state.stack.length > 0)
        document.getElementById('searchBtn').style.display = '';
    renderCurrentItems();
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    state.searchQuery = '';
    document.getElementById('searchClear').classList.remove('visible');
    renderCurrentItems();
    document.getElementById('searchInput').focus();
}

let searchDebounceTimer = null;

function onSearchInput(val) {
    state.searchQuery = val;
    const clearBtn = document.getElementById('searchClear');
    if (val.length > 0) clearBtn.classList.add('visible');
    else                clearBtn.classList.remove('visible');

    // Debounce: the full list re-render (filter + highlight regex + DOM rebuild)
    // is too heavy to run on every single keystroke without making typing feel
    // laggy. Wait for a short pause in typing before re-rendering.
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(renderCurrentItems, 120);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────

function showRoot() {
    // Close search if open
    if (state.searchActive) closeSearch();
    state.stack = [];
    state.items = [];

    setHeader('CircleFTP', false);
    setBreadcrumb([]);
    setActionBar([]);

    const cards = CONFIG.roots.map((r,i) => `
        <div class="root-card" onclick="browseRoot(${i})">
            <div class="root-icon">${r.icon}</div>
            <div class="root-info">
                <div class="root-name">${esc(r.name)}</div>
                <div class="root-desc">${esc(r.desc)}</div>
            </div>
            <div class="farrow">›</div>
        </div>`).join('');

    setContent(`<div class="root-list">
        <div class="home-hero">
            <span class="home-hero-icon">🎌</span>
            <div class="home-hero-title">CircleFTP</div>
            <div class="home-hero-sub">Browse · Stream · Track</div>
        </div>
        ${buildContinueCard()}${cards}
    </div>`);
}

/** Builds the "Continue Browsing" card HTML, or '' if nothing saved. */
function buildContinueCard() {
    const last = loadLastFolder();
    if (!last || !last.length) return '';

    const deepest   = last[last.length - 1];
    const pathLabel = last.map(s => s.title).join(' › ');
    const safePath  = pathLabel.length > 60 ? '…' + pathLabel.slice(-58) : pathLabel;

    return `
    <div class="continue-card" onclick="continueBrowsing()">
        <div class="continue-icon">⏵</div>
        <div class="continue-info">
            <div class="continue-label">Continue Browsing</div>
            <div class="continue-title">${esc(deepest.title)}</div>
            <div class="continue-path">${esc(safePath)}</div>
        </div>
        <button class="continue-dismiss"
            onclick="event.stopPropagation(); dismissContinue();">✕</button>
    </div>`;
}

/** Jumps straight back into the last-browsed folder, breadcrumbs intact. */
function continueBrowsing() {
    const last = loadLastFolder();
    if (!last || !last.length) return;
    const deepest = last[last.length - 1];
    state.stack   = last.slice(0, -1);
    browse(deepest.url, deepest.title);
}

function dismissContinue() {
    clearLastFolder();
    showRoot();
}

function browseRoot(idx) {
    const r = CONFIG.roots[idx];
    browse(r.url, r.name);
}

async function browse(url, title) {
    // Reset search when navigating
    if (state.searchActive) closeSearch();
    state.searchQuery = '';

    state.stack.push({ url, title });
    setHeader(title, true);
    setBreadcrumb(state.stack);
    setActionBar([]);
    setContent(`<div class="state-center"><div class="spinner"></div><span>Loading…</span></div>`);

    try {
        const items  = await fetchDirectory(url);
        state.items  = items;
        renderCurrentItems();
        saveLastFolder(state.stack);
    } catch (err) {
        state.stack.pop();
        setBreadcrumb(state.stack);
        const safeUrl   = escAttr(url);
        const safeTitle = escAttr(title);
        setContent(`
            <div class="state-center">
                <div style="font-size:28px">⚠️</div>
                <span>Could not load folder</span>
                <span class="err-msg">${esc(err.message)}</span>
                <button class="retry-btn"
                    onclick="browse('${safeUrl}','${safeTitle}')">Retry</button>
            </div>`);
    }
}

/** Re-render the current items respecting any active search filter. */
function renderCurrentItems() {
    renderItems(state.items, state.searchQuery);
}

function renderItems(allItems, query) {
    // Precompute once per render pass (not per item) — this is the
    // expensive part that was being repeated for every single item
    // on every keystroke.
    const queryWords = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    const hlRegex     = buildHighlightRegex(query);

    // Pair each item with its original index in state.items
    // so clickItem() can always reference the full unfiltered array.
    const filtered = allItems
        .map((item, idx) => ({ item, idx }))
        .filter(({ item }) => matchesWords(item.name, queryWords));

    // Action bar: show when the FULL folder has videos (not filtered count)
    setActionBar(allItems);

    if (!filtered.length) {
        const msg = query.trim()
            ? `<div class="no-results">🔍</div><span>No results for "<b>${esc(query)}</b>"</span>`
            : '📂 This folder is empty';
        setContent(`<div class="state-center">${msg}</div>`);
        return;
    }

    const rows = filtered.map(({ item, idx }) => {
        if (item.isDir) {
            return `
            <div class="fitem" onclick="clickItem(${idx})">
                <div class="ficon fi-dir">📁</div>
                <div class="finfo">
                    <div class="fname">${highlightName(item.name, hlRegex)}</div>
                    <div class="fmeta">Folder</div>
                </div>
                <div class="farrow">›</div>
            </div>`;
        }
        if (item.isVideo) {
            const rec       = watchRecord(item.url);
            const completed = !!(rec && rec.completed);
            const percent   = rec ? (completed ? 100 : (rec.percent || 0)) : 0;
            const inProgress = !completed && percent > 0;

            let iconClass = 'fi-video';
            let iconGlyph = '▶';
            let tagHtml   = '';
            if (completed) {
                iconClass += ' fi-watched';
                iconGlyph  = '✓';
                tagHtml    = ' · <span class="watched-tag">Watched</span>';
            } else if (inProgress) {
                iconClass += ' fi-progress';
                tagHtml    = ` · <span class="progress-tag">${percent}% watched</span>`;
            }

            const meta = item.size ? `Video · ${esc(item.size)}` : 'Video';
            return `
            <div class="fitem" onclick="clickItem(${idx})">
                <div class="ficon ${iconClass}">${iconGlyph}</div>
                <div class="finfo">
                    <div class="fname">${highlightName(item.name, hlRegex)}</div>
                    <div class="fmeta">${meta}${tagHtml}</div>
                </div>
                <div class="farrow farrow-play">▶</div>
            </div>`;
        }
        // Non-video file (subs, nfo…)
        return `
            <div class="fitem fi-other">
                <div class="ficon fi-file">📄</div>
                <div class="finfo">
                    <div class="fname">${esc(item.name)}</div>
                    <div class="fmeta">${esc(item.size||'File')}</div>
                </div>
            </div>`;
    }).join('');

    setContent(`<div>${rows}</div>`);
}

/**
 * Handle tap on a list item.
 * idx = original index in state.items (not filtered position).
 * For videos: always passes the FULL episode list to MX Player
 * so prev/next works across the whole season even if search was active.
 */
function clickItem(idx) {
    const item = state.items[idx];
    if (!item) return;

    if (item.isDir) {
        browse(item.url, item.name);
        return;
    }

    if (item.isVideo) {
        // Build full ordered video list from the unfiltered state.items
        const allVideos = state.items.filter(i => i.isVideo);
        const startAt   = allVideos.findIndex(v => v.url === item.url);
        // What MX Player will actually play forward through this session —
        // NOT the whole season, just from the tapped episode onward. Earlier
        // episodes weren't touched and shouldn't get marked from this tap.
        const playSeq   = allVideos.slice(Math.max(0, startAt));

        markWatched(item.url);
        saveToHistory(item.url, item.name);
        saveLastPlaylist(playSeq.map(v => v.url));
        renderCurrentItems();

        if (window.Android) {
            window.Android.openVideoWithPlaylist(
                JSON.stringify(allVideos.map(v => v.url)),
                JSON.stringify(allVideos.map(v => v.name)),
                Math.max(0, startAt)
            );
        } else {
            window.open(item.url, '_blank');
        }
    }
}

function goBack() {
    // If on history tab, switch back to browse instead of navigating back
    if (state.activeTab === 'history') {
        showTab('browse');
        return;
    }
    // If search is active, close it first instead of navigating back
    if (state.searchActive) {
        closeSearch();
        return;
    }
    if (state.stack.length === 0) {
        if (window.Android) window.Android.exitApp();
        return;
    }
    if (state.stack.length === 1) {
        showRoot();
        return;
    }
    state.stack.pop();
    const parent = state.stack.pop();
    browse(parent.url, parent.title);
}

function jumpToBreadcrumb(idx) {
    if (idx < 0) { showRoot(); return; }
    const target = state.stack[idx];
    state.stack  = state.stack.slice(0, idx);
    browse(target.url, target.title);
}

// ── PLAYBACK ──────────────────────────────────────────────────────────────────

/** Play All — starts from episode 1 with full playlist. */
function playAll() {
    const videos = state.items.filter(i => i.isVideo);
    if (!videos.length) return;
    // Only the episode that's actually about to start gets an optimistic
    // mark. The rest get filled in for real if/when MX Player reports back
    // how far the user actually got — no more "tapped Play All, instantly
    // 12/12 watched" before anything's played.
    markWatched(videos[0].url);
    saveToHistory(videos[0].url, videos[0].name);
    saveLastPlaylist(videos.map(v => v.url));
    renderCurrentItems();
    if (window.Android) {
        window.Android.openVideoWithPlaylist(
            JSON.stringify(videos.map(v => v.url)),
            JSON.stringify(videos.map(v => v.name)),
            0
        );
    }
}

/**
 * Resume Play — finds the first in-progress episode (real position data from
 * MX Player), or the first completely unwatched episode, or ep 1 if everything
 * is already watched. Passes the full playlist from that point forward so
 * MX Player's prev/next still covers the whole season.
 */
function resumePlay() {
    const videos = state.items.filter(i => i.isVideo);
    if (!videos.length) return;

    // 1. First episode with real in-progress data (stopped mid-way)
    let resumeIdx = videos.findIndex(v => {
        const rec = watchRecord(v.url);
        return rec && !rec.completed && rec.percent > 0;
    });

    // 2. First completely unwatched episode
    if (resumeIdx === -1) {
        resumeIdx = videos.findIndex(v => !watchRecord(v.url));
    }

    // 3. Everything watched — restart from ep 1
    if (resumeIdx === -1) resumeIdx = 0;

    markWatched(videos[resumeIdx].url);
    saveToHistory(videos[resumeIdx].url, videos[resumeIdx].name);
    // Playlist starts at the resume point so MX Player next/prev only
    // goes forward from here — but we still pass the full array so
    // MX Player knows the episode count.
    saveLastPlaylist(videos.slice(resumeIdx).map(v => v.url));
    renderCurrentItems();

    if (window.Android) {
        window.Android.openVideoWithPlaylist(
            JSON.stringify(videos.map(v => v.url)),
            JSON.stringify(videos.map(v => v.name)),
            resumeIdx
        );
    }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────

function setContent(html) {
    const el = document.getElementById('content');
    el.innerHTML = html;
    el.scrollTop = 0;
}

function setHeader(title, showSearch) {
    document.getElementById('hdrTitle').textContent =
        title.length > 30 ? title.slice(0,28)+'…' : title;
    document.getElementById('backBtn').style.display  = state.stack.length > 0 ? 'flex' : 'none';
    document.getElementById('searchBtn').style.display = showSearch ? '' : 'none';
}

function setBreadcrumb(stack) {
    const el = document.getElementById('bread');
    if (!stack.length) { el.style.display = 'none'; el.innerHTML = ''; return; }

    el.style.display = 'flex';
    let html = `<span class="crumb" onclick="showRoot()">Home</span>`;
    stack.forEach((entry, i) => {
        const isLast = i === stack.length - 1;
        const label  = entry.title.length > 22 ? entry.title.slice(0,20)+'…' : entry.title;
        html += `<span class="crumb-sep">›</span>`;
        if (isLast) html += `<span class="crumb crumb-current">${esc(label)}</span>`;
        else html += `<span class="crumb" onclick="jumpToBreadcrumb(${i})">${esc(label)}</span>`;
    });
    el.innerHTML  = html;
    el.scrollLeft = el.scrollWidth;
}

/**
 * Shows/hides the action bar (Play All / Resume + progress row).
 * Accepts the FULL unfiltered items array for the current folder
 * (or [] / false to hide) — computes completed/in-progress counts from it.
 */
function setActionBar(items) {
    const el = document.getElementById('actionBar');
    const videos = Array.isArray(items) ? items.filter(i => i.isVideo) : [];

    if (!videos.length) {
        el.style.display = 'none';
        return;
    }

    let completedCount  = 0;
    let inProgressCount = 0;
    videos.forEach(v => {
        const rec = watchRecord(v.url);
        if (rec && rec.completed) completedCount++;
        else if (rec && rec.percent > 0) inProgressCount++;
    });

    const pct = Math.round((completedCount / videos.length) * 100);
    let text  = `${completedCount} / ${videos.length} episode${videos.length === 1 ? '' : 's'} watched`;
    if (inProgressCount > 0) {
        text += ` · ${inProgressCount} in progress`;
    }

    document.getElementById('progressText').textContent = text;
    document.getElementById('progressFill').style.width = pct + '%';

    // Update Resume button label to show which episode it'll pick up from
    const resumeTarget =
        videos.find(v => { const r = watchRecord(v.url); return r && !r.completed && r.percent > 0; }) ||
        videos.find(v => !watchRecord(v.url)) ||
        videos[0];
    if (resumeTarget) {
        const epNum = extractEpNum(resumeTarget.name);
        document.getElementById('resumeBtn').textContent =
            '\u23E9\u00A0 ' + (epNum ? 'Resume Ep ' + epNum : 'Resume');
    }

    el.style.display = 'flex';
}

// ── HISTORY ───────────────────────────────────────────────────────────────────

function loadHistory() {
    try {
        const raw = localStorage.getItem(STORAGE_KEYS.HISTORY);
        return raw ? JSON.parse(raw) : [];
    } catch (_) { return []; }
}

/**
 * Pushes a played episode to the front of the history list (newest first).
 * Deduplicates by URL so rewatching an episode just bumps it to the top.
 * Capped at 100 entries.
 */
function saveToHistory(url, name) {
    try {
        let h = loadHistory().filter(e => e.url !== url);
        h.unshift({ url, name, at: Date.now() });
        if (h.length > 100) h.length = 100;
        localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(h));
    } catch (_) {}
}

function clearHistory() {
    try { localStorage.removeItem(STORAGE_KEYS.HISTORY); } catch (_) {}
    renderHistory();
}

/** Relative time string: "Just now", "5m ago", "2h ago", "3d ago". */
function timeAgo(ts) {
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'Just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);
    if (d < 7)  return d + 'd ago';
    return new Date(ts).toLocaleDateString();
}

/**
 * Extract episode number from a filename for the Resume button label.
 * Tries explicit episode tags (ep/episode/E) first, falls back to
 * the first 2–4 digit sequence in the name.
 */
function extractEpNum(name) {
    let m = name.match(/(?:ep(?:isode)?|[\s._-]E)[\s._-]*(\d+)/i);
    if (m) return parseInt(m[1], 10);
    m = name.match(/\b(\d{2,4})\b/);
    if (m) return parseInt(m[1], 10);
    return null;
}

/** Renders the history tab content into #historyView. */
function renderHistory() {
    const el      = document.getElementById('historyView');
    const history = loadHistory();

    if (!history.length) {
        el.innerHTML = `<div class="state-center">
            <div style="font-size:36px">🕒</div>
            <span>No history yet</span>
            <span style="font-size:12px;color:var(--dim)">Episodes you play will appear here</span>
        </div>`;
        return;
    }

    const rows = history.map(entry => {
        const rec        = watchRecord(entry.url);
        const completed  = !!(rec && rec.completed);
        const percent    = rec ? (completed ? 100 : (rec.percent || 0)) : 0;
        const inProgress = !completed && percent > 0;

        let iconClass = 'fi-video';
        let iconGlyph = '▶';
        let tagHtml   = '';
        if (completed) {
            iconClass = 'fi-video fi-watched';
            iconGlyph = '✓';
            tagHtml   = ' · <span class="watched-tag">Watched</span>';
        } else if (inProgress) {
            iconClass = 'fi-video fi-progress';
            tagHtml   = ' · <span class="progress-tag">' + percent + '% watched</span>';
        }

        return `<div class="fitem" onclick="playHistoryItem('${escAttr(entry.url)}','${escAttr(entry.name)}')">
            <div class="ficon ${iconClass}">${iconGlyph}</div>
            <div class="finfo">
                <div class="fname">${esc(entry.name)}</div>
                <div class="fmeta">${timeAgo(entry.at)}${tagHtml}</div>
            </div>
            <div class="farrow farrow-play">▶</div>
        </div>`;
    }).join('');

    el.innerHTML = `
        <div class="hist-header">
            <span class="hist-section-title">Recently Watched</span>
            <button class="hist-clear-btn" onclick="clearHistory()">Clear</button>
        </div>
        <div>${rows}</div>`;
}

/**
 * Tap a history entry → open that episode directly in MX Player.
 * Single-video launch (no playlist) since we don't have the folder context here.
 */
function playHistoryItem(url, name) {
    saveLastPlaylist([url]);
    if (window.Android) {
        window.Android.openVideoWithPlaylist(
            JSON.stringify([url]),
            JSON.stringify([name]),
            0
        );
    } else {
        window.open(url, '_blank');
    }
}

// ── TAB SWITCHING ─────────────────────────────────────────────────────────────

/**
 * Switch between Browse and History tabs.
 * Browse tab restores the full header/breadcrumb/action-bar state.
 * History tab overrides the header and hides browse-only chrome.
 */
function showTab(tab) {
    state.activeTab = tab;
    const isBrowse  = tab === 'browse';

    document.getElementById('content').style.display     = isBrowse ? '' : 'none';
    document.getElementById('historyView').style.display = isBrowse ? 'none' : '';
    document.getElementById('tabBrowse').classList.toggle('tab-active',  isBrowse);
    document.getElementById('tabHistory').classList.toggle('tab-active', !isBrowse);

    if (isBrowse) {
        document.getElementById('hdrBadge').style.display = '';
        const inFolder = state.stack.length > 0;
        setHeader(
            inFolder ? state.stack[state.stack.length - 1].title : 'CircleFTP',
            inFolder
        );
        setBreadcrumb(state.stack);
        setActionBar(state.items);
    } else {
        // Quietly reset search state without triggering a browse re-render
        if (state.searchActive) {
            state.searchActive = false;
            state.searchQuery  = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchWrap').classList.remove('active');
            document.getElementById('searchClear').classList.remove('visible');
        }
        document.getElementById('hdrBadge').style.display    = 'none';
        document.getElementById('hdrTitle').textContent       = 'History';
        document.getElementById('backBtn').style.display      = 'none';
        document.getElementById('searchBtn').style.display    = 'none';
        document.getElementById('bread').style.display        = 'none';
        document.getElementById('actionBar').style.display    = 'none';
        renderHistory();
    }
}

// ── ESCAPING ──────────────────────────────────────────────────────────────────

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(s) {
    return String(s)
        .replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
showRoot();
